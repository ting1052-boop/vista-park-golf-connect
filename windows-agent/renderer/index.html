<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISTA Bay Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="agent-shell warning-shell">
      <section class="warning-card">
        <div class="warning-main">
          <div>
            <p class="eyebrow">VISTA</p>
            <strong id="warningBay">타석</strong>
          </div>
          <div class="remaining-box">
            <span>남은 시간</span>
            <strong id="warningRemaining">--:--</strong>
          </div>
        </div>

        <p id="extensionMessage" class="extension-message"></p>

        <div class="button-row">
          <button id="confirmButton" type="button" class="secondary-button">확인</button>
          <button id="extendButton" type="button" class="primary-button">연장</button>
        </div>

        <div id="extensionDialog" class="extension-dialog" hidden>
          <div class="extension-panel">
            <p class="dialog-title">이용시간 연장</p>
            <div class="stepper">
              <button id="decreaseButton" type="button" class="step-button">-</button>
              <strong id="extensionMinutes">30분</strong>
              <button id="increaseButton" type="button" class="step-button">+</button>
            </div>
            <div class="dialog-buttons">
              <button id="cancelExtensionButton" type="button" class="secondary-button">취소</button>
              <button id="confirmExtensionButton" type="button" class="primary-button">연장</button>
            </div>
          </div>
        </div>
      </section>

      <section class="lock-card">
        <p class="eyebrow">VISTA Park Golf Connect</p>
        <h2>이용 시간이 종료되었습니다</h2>
        <p class="lock-body">
          이용이 종료되었습니다.<br />
          새 고객 이용 시작 시 화면이 자동으로 사라집니다.
        </p>
        <p id="lockAutoShutdown" class="lock-auto-shutdown"></p>
        <div class="lock-info">
          <span id="lockBay">타석</span>
          <strong id="lockEndsAt">종료 시간</strong>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
