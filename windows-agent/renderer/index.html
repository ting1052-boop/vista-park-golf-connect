<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISTA Bay Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="agent-shell mini-shell">
      <section class="mini-card">
        <div>
          <p class="eyebrow">VISTA</p>
          <h1 id="miniBay">타석</h1>
        </div>
        <div class="mini-time">
          <strong id="miniTime">대기</strong>
          <span id="miniLabel">세션 없음</span>
        </div>
      </section>

      <section class="warning-card">
        <p class="eyebrow">VISTA Park Golf Connect</p>
        <h2 id="warningTitle">이용 종료 안내</h2>
        <p id="warningBody" class="warning-body">이용 종료 시간이 가까워지고 있습니다.</p>

        <div class="session-grid">
          <div>
            <span>타석</span>
            <strong id="warningBay">-</strong>
          </div>
          <div>
            <span>남은 시간</span>
            <strong id="warningRemaining">-</strong>
          </div>
          <div>
            <span>종료 예정</span>
            <strong id="warningEndsAt">-</strong>
          </div>
          <div>
            <span>연장 요금</span>
            <strong id="warningPrice">-</strong>
          </div>
        </div>

        <p id="extensionMessage" class="extension-message"></p>

        <div class="button-row">
          <button id="extendButton" type="button" class="primary-button">연장</button>
          <button id="confirmButton" type="button" class="secondary-button">확인</button>
        </div>
      </section>

      <section class="lock-card">
        <p class="eyebrow">VISTA Park Golf Connect</p>
        <h2>이용 시간이 종료되었습니다</h2>
        <p class="lock-body">
          이용 연장 또는 퇴실 처리가 필요합니다.<br />
          관리자 확인 후 화면이 해제됩니다.
        </p>
        <div class="lock-info">
          <span id="lockBay">타석</span>
          <strong id="lockEndsAt">종료 시간</strong>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
