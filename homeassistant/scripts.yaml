# VISTA Park Golf Connect - Home Assistant script draft
# Replace every entity_id placeholder with the actual HA entity ID.
# VISTA calls only these script IDs so device/provider changes stay inside HA.

shared_on:
  alias: VISTA Shared ON
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.FILL_GOLF_ROOM_LIGHT
          - switch.FILL_LOBBY_HALL_LIGHT
    # If Hejhome AC is exposed as climate, use climate.set_hvac_mode / climate.set_temperature.
    # If it is exposed as scene, replace these steps with scene.turn_on.
    - service: climate.set_hvac_mode
      target:
        entity_id:
          - climate.FILL_GOLF_ROOM_AC
          - climate.FILL_LOBBY_HALL_AC
      data:
        hvac_mode: cool
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.FILL_GOLF_ROOM_AC
          - climate.FILL_LOBBY_HALL_AC
      data:
        temperature: 24

shared_off:
  alias: VISTA Shared OFF
  mode: single
  sequence:
    - service: climate.turn_off
      target:
        entity_id:
          - climate.FILL_GOLF_ROOM_AC
          - climate.FILL_LOBBY_HALL_AC
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_GOLF_ROOM_LIGHT
          - switch.FILL_LOBBY_HALL_LIGHT

bay1_on:
  alias: VISTA Bay 1 ON
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_01_PC
          - switch.FILL_HEJHOME_BAY_01_PROJECTOR
          - switch.FILL_HEJHOME_BAY_01_RECEIVER

bay1_off:
  alias: VISTA Bay 1 OFF
  mode: single
  sequence:
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_HEJHOME_BAY_01_PROJECTOR
          - switch.FILL_HEJHOME_BAY_01_RECEIVER
    # PC hard power-off should run only after the golf software/session has ended.
    - delay: "00:00:10"
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_01_PC

bay2_on:
  alias: VISTA Bay 2 ON
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_02_PC
          - switch.FILL_HEJHOME_BAY_02_PROJECTOR

bay2_off:
  alias: VISTA Bay 2 OFF
  mode: single
  sequence:
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_HEJHOME_BAY_02_PROJECTOR
    - delay: "00:00:10"
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_02_PC

bay3_on:
  alias: VISTA Bay 3 ON
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_03_PC
          - switch.FILL_HEJHOME_BAY_03_PROJECTOR

bay3_off:
  alias: VISTA Bay 3 OFF
  mode: single
  sequence:
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_HEJHOME_BAY_03_PROJECTOR
    - delay: "00:00:10"
    - service: switch.turn_off
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_03_PC

test_bay1_pc_on:
  alias: VISTA Test Tapo Bay 1 PC ON
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.FILL_TAPO_BAY_01_PC

test_bay1_pc_off:
